<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#FCE4B6"/>

  <!-- Carrot (rotated, top-right) -->
  <g transform="translate(310 90) rotate(20)">
    <!-- Carrot leaves -->
    <g fill="#5DA84A">
      <path d="M-10 -10 Q-30 -60 -10 -90 Q5 -55 -10 -10 Z"/>
      <path d="M10 -10 Q5 -70 35 -95 Q25 -55 10 -10 Z"/>
      <path d="M28 -8 Q45 -55 80 -65 Q55 -30 28 -8 Z"/>
    </g>
    <!-- Carrot body -->
    <path d="M-40 0 L40 0 L20 230 Q0 250 -20 230 Z" fill="#F39B3F"/>
    <!-- Carrot stripes -->
    <g stroke="#D67A1C" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="-25" y1="40" x2="-10" y2="45"/>
      <line x1="10" y1="80" x2="25" y2="85"/>
      <line x1="-18" y1="120" x2="-5" y2="125"/>
      <line x1="5" y1="160" x2="18" y2="165"/>
    </g>
  </g>

  <!-- Bunny (center-bottom) -->
  <g transform="translate(180 260)">
    <!-- Left ear -->
    <ellipse cx="-25" cy="-95" rx="22" ry="70" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6"/>
    <ellipse cx="-25" cy="-90" rx="10" ry="50" fill="#F8C9D4"/>
    <!-- Right ear -->
    <ellipse cx="30" cy="-95" rx="22" ry="70" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6"/>
    <ellipse cx="30" cy="-90" rx="10" ry="50" fill="#F8C9D4"/>

    <!-- Body -->
    <ellipse cx="0" cy="90" rx="80" ry="90" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6"/>
    <!-- Head -->
    <circle cx="0" cy="0" r="68" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6"/>

    <!-- Cheeks -->
    <circle cx="-38" cy="15" r="11" fill="#F8B0BC"/>
    <circle cx="38" cy="15" r="11" fill="#F8B0BC"/>

    <!-- Eyes -->
    <circle cx="-22" cy="-8" r="6" fill="#2A2A2A"/>
    <circle cx="22" cy="-8" r="6" fill="#2A2A2A"/>

    <!-- Nose + mouth -->
    <path d="M-6 12 Q0 18 6 12" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M0 18 L0 26" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 26 Q-7 32 -10 28" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M0 26 Q7 32 10 28" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Arms -->
    <ellipse cx="-72" cy="80" rx="18" ry="35" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6" transform="rotate(-10 -72 80)"/>
    <ellipse cx="72" cy="80" rx="18" ry="35" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6" transform="rotate(15 72 80)"/>

    <!-- Feet -->
    <ellipse cx="-32" cy="172" rx="22" ry="13" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6"/>
    <ellipse cx="32" cy="172" rx="22" ry="13" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="6"/>
  </g>

  <!-- Carrot greens held by bunny (front) -->
  <g transform="translate(252 350)" fill="#5DA84A">
    <path d="M-5 0 Q-15 40 5 70 Q10 30 -5 0 Z"/>
    <path d="M10 0 Q15 35 35 55 Q20 25 10 0 Z"/>
    <path d="M-10 0 Q-25 30 -45 45 Q-20 18 -10 0 Z"/>
  </g>
</svg>
